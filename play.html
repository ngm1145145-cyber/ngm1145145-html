<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="play.ico" type="image/x-icon">
    <title>多功能媒体播放器</title>

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0d1117, #161b22);
            min-height: 100vh;
            padding: 50px 20px;
            max-width: 1200px;
            margin: 0 auto;
            color: #fff;
        }

        .main-title {
            text-align: center;
            font-size: 48px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5, #7b43ff);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 35px;
            font-weight: 800;
            letter-spacing: 1px;
            animation: fadeIn 0.8s ease;
        }

        .upload-container {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeUp 0.6s ease;
        }

        .file-input {
            display: none;
        }

        .upload-btn {
            display: inline-block;
            padding: 16px 48px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: #fff;
            font-size: 19px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,210,255,0.25);
            border: none;
        }

        .upload-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 30px rgba(0,210,255,0.35);
        }

        .file-info {
            margin-top: 15px;
            font-size: 16px;
            color: #adbac7;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 35px;
            margin-bottom: 40px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.25);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            animation: fadeUp 0.8s ease backwards;
        }

        .player-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0,210,255,0.3);
        }

        .card-title {
            font-size: 20px;
            color: #e0e0e0;
            margin-bottom: 22px;
            font-weight: 500;
        }

        video {
            width: 100% !important;
            max-width: 1080px;
            border-radius: 14px;
            outline: none;
            margin: 0 auto;
        }

        .video-js, #plyrPlayer {
            border-radius: 14px !important;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #00d2ff; border-radius: 4px; }
    </style>
</head>

<body>
    <h1 class="main-title">多功能媒体播放器</h1>

    <div class="upload-container">
        <label class="upload-btn" for="mediaFile">📂 选择视频 / 音频文件</label>
        <input type="file" id="mediaFile" class="file-input" accept="video/*,audio/*">
        <div class="file-info" id="fileInfo">未选择文件</div>
    </div>

    <!-- 原生播放器 -->
    <div class="player-card">
        <div class="card-title">🔹 原生浏览器播放器</div>
        <video id="nativePlayer" controls controlslist="play pause volume download fullscreen" download preload="auto"></video>
    </div>

    <!-- Video.js 播放器 -->
    <div class="player-card">
        <div class="card-title">🔹 Video.js 专业播放器</div>
        <video id="videoJsPlayer" class="video-js vjs-big-play-centered" controls preload="auto"></video>
    </div>

    <!-- Plyr 播放器 -->
    <div class="player-card">
        <div class="card-title">🔹 Plyr 高级播放器</div>
        <video id="plyrPlayer" controls playsinline></video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.min.js"></script>

    <script>
        // Video.js 初始化
        const videoJsPlayer = videojs('videoJsPlayer', {
            fluid: true,
            autoplay: false,
            playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 2],
            controlBar: {
                children: ['playToggle','volumePanel','currentTimeDisplay','timeDivider','durationDisplay','progressControl','remainingTimeDisplay','playbackRateMenuButton','fullscreenToggle']
            }
        });

        // Plyr 初始化
        const plyrPlayer = new Plyr('#plyrPlayer', {
            controls: ['play-large','play','progress','current-time','duration','mute','volume','settings','pip','download','fullscreen'],
            settings: ['quality','speed'],
            speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
        });

        // 元素获取
        const nativePlayer = document.getElementById('nativePlayer');
        const fileInput = document.getElementById('mediaFile');
        const fileInfo = document.getElementById('fileInfo');
        
        let currentFile = null; // 保存当前文件

        // 上传文件
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            currentFile = file; // 保存文件供下载使用

            fileInfo.textContent = `已加载：${file.name}`;
            const fileUrl = URL.createObjectURL(file);
            const mimeType = file.type;

            // 原生
            nativePlayer.src = fileUrl;
            nativePlayer.type = mimeType;
            nativePlayer.load();

            // Video.js
            videoJsPlayer.src({ src: fileUrl, type: mimeType });
            videoJsPlayer.load();

            // Plyr
            plyrPlayer.stop();
            plyrPlayer.source = {
                type: file.type.startsWith('video') ? 'video' : 'audio',
                sources: [{ src: fileUrl, type: mimeType }]
            };
            plyrPlayer.restart();
        });

        // ✅ 核心修复：Plyr 下载按钮不跳转到HTML，直接下载上传的文件
        plyrPlayer.on('download', (event) => {
            if (!currentFile) {
                alert('请先选择媒体文件！');
                event.preventDefault();
                return;
            }

            // 创建下载链接
            const a = document.createElement('a');
            a.href = URL.createObjectURL(currentFile);
            a.download = currentFile.name;
            a.click();
            
            // 阻止默认行为（不跳转到网页）
            event.preventDefault();
        });
    </script>
<center>
<a href="index.html">返回首页</a>
</center>
</body>
</html>
