        <h1>Python 基础语法</h1>
        <div class="content">
            <h3>最简单的代码示例：</h3>
            <pre style="background:#f1f1f1; padding:1rem; border-radius:5px; margin:1rem 0;">
import os
os.system("taskkill /im qq.exe")
print("已删除QQ的进程")
            </pre>
            <br>
            <h3>核心特点：</h3>
            <p>• 不用写分号、大括号，用缩进区分代码块</p>
            <p>• 变量无需声明类型</p>
            <p>• 丰富的内置函数</p>
            <p>• 支持面向对象、函数式编程</p>
